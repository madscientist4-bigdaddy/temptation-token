[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# v3c profile: compiles only contracts/ so legacy root contracts and
# outputs/ flattened files are excluded. Use for V3c-specific tests.
[profile.v3c]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# v3d profile: same scope as v3c but targets V3d + Keeper3 contracts/tests.
[profile.v3d]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
remappings = [
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]
