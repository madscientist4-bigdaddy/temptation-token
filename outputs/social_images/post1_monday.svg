<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a0d1f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#f0d060"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="24" y="24" width="1032" height="1032" rx="20" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>
  <!-- Logo top left -->
  <text x="54" y="88" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#c9a84c" letter-spacing="3">TEMPTATION TOKEN</text>
  <text x="54" y="112" font-family="Arial, sans-serif" font-size="16" fill="#888" letter-spacing="2">$TTS · BASE BLOCKCHAIN</text>
  <!-- Round 1 badge -->
  <rect x="850" y="50" width="176" height="52" rx="26" fill="#c9a84c"/>
  <text x="938" y="82" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0d0d0d" text-anchor="middle">ROUND 1 LIVE</text>
  <!-- Fire emoji large -->
  <text x="540" y="360" font-size="180" text-anchor="middle">🔥</text>
